<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsorship | 5th Chinese American Convention</title>

    <link rel="icon" href="https://storage.googleapis.com/objects.ucausa.org/logo/logo.png" type="image/png">

    <!-- Google Material Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="global.css">
    <style>
        .sponsorship-section {
            padding: 60px 24px;
            background-color: var(--bg-white, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 150px);
        }
        .sponsorship-header {
            max-width: 1000px;
            width: 100%;
            margin-bottom: 24px;
        }
        .sponsorship-title {
            color: var(--brand-navy, #0A2540);
            font-size: 2.5rem;
            font-weight: 800;
        }
        .pdf-container {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="sponsorship-section">
            <div class="sponsorship-header">
                <h1 class="sponsorship-title">2026 Sponsorship Prospectus</h1>
            </div>
            <div class="pdf-container">
                <iframe src="sponsorship2026.pdf" width="100%" height="100%" style="border: none;" title="2026 UCA Convention Sponsorship Prospectus">
                    <p>It appears you don't have a PDF plugin for this browser. You can <a href="sponsorship2026.pdf">click here to download the PDF file.</a></p>
                </iframe>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="global.js"></script>
</body>

</html>
