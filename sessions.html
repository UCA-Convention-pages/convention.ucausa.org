<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions | 5th Chinese American Convention</title>

    <link rel="icon" href="https://storage.googleapis.com/objects.ucausa.org/logo/logo.png" type="image/png">

    <!-- Google Material Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/articles.css">
</head>

<body>
    <!-- Header is injected dynamically here -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Word Cloud Section -->
        <section class="word-cloud-section">
            <div class="word-cloud-container">
                <div class="articles-header" style="margin-bottom: 24px;"> <!-- Reusing header style for consistency -->
                    <div class="articles-title-stack" style="text-align: center; width: 100%;">
                       <h2>大会亮点 • Convention Highlights</h2>
                       <p>Explore the key themes and events shaping our convention.</p>
                   </div>
               </div>
                <img src="images/session_cover1.png" alt="Convention Highlights Word Cloud" class="word-cloud-image">
            </div>
        </section>

        <!-- News Section -->
        <section class="news-section">
            <div class="news-container">
                <div class="news-header">
                    <div class="header-left">
                        <span class="eyebrow">LATEST NEWS • 最新动态</span>
                        <h2>All Chinese Americans Convention News</h2>
                    </div>
                    <div class="header-right">
                        <a href="articles.html" class="view-all-link">View All News <span
                                class="material-symbols-outlined">arrow_forward</span></a>
                    </div>
                </div>
                <div class="news-grid" id="news-grid">
                    <!-- Cards will be populated dynamically -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer is injected dynamically here -->
    <div id="footer-placeholder"></div>

    <script src="global.js"></script>
    <script src="scripts/articles.js"></script>
</body>

</html>
