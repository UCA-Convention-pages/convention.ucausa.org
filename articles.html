<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convention News | United Chinese Americans</title>
    <link rel="icon" href="https://storage.googleapis.com/objects.ucausa.org/logo/logo.png" type="image/png">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/articles.css">
    <script defer src="global.js"></script>
    <script defer src="scripts/articles.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body>
    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>
    <main>
        <section class="news-hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>Chinese Americans Convention News</h1>
            </div>
        </section>
        <section class="news-section">
            <div class="news-container">
                <div class="news-header">
                    <div class="header-left">
                        <span class="eyebrow">LATEST NEWS • 最新动态</span>
                        <h2>All Chinese Americans Convention News</h2>
                    </div>
                    <div class="header-right">
                        <a href="#" class="view-all-link">View All News <span
                                class="material-symbols-outlined">arrow_forward</span></a>
                    </div>
                </div>
                <div class="news-grid" id="news-grid">
                    <!-- Cards will be populated dynamically -->
                </div>
            </div>
        </section>
    </main>
    <!-- Footer will be loaded here -->
    <div id="footer-placeholder"></div>
</body>

</html>
